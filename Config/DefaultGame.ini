; Stage the project's AngelScript source tree so packaged (non-editor) builds can
; locate and compile .as files at startup (FPaths::ProjectDir()/Script). The path is
; resolved relative to the project's Content/ directory, so "../Script" points at the
; project-root Script/ folder (which also holds Binds.Cache / PrecompiledScript.Cache).
